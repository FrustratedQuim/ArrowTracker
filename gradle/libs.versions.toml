[versions]
kotlin = "2.2.10"
shadow = "9.0.2"
java = "21"
entityLib = "2.4.11"
paperApi = "1.21.4-R0.1-SNAPSHOT"
packetEvents = "2.11.2"

[libraries]
kotlin-stdlib-jdk8 = { module = "org.jetbrains.kotlin:kotlin-stdlib-jdk8", version.ref = "kotlin" }
entitylib-spigot = { module = "com.github.Tofaa2.EntityLib:spigot", version.ref = "entityLib" }
paper-api = { module = "io.papermc.paper:paper-api", version.ref = "paperApi" }
